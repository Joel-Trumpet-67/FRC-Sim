<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FRC REBUILT Sim</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px; border-radius: 8px;
      pointer-events: none;
      line-height: 1.8;
    }

    #robot-ui {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }

    #load-robot-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: monospace;
    }

    #load-robot-btn:hover { background: #1558b0; }

    #robot-status {
      color: #aaa;
      font-size: 12px;
      font-family: monospace;
      text-align: right;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 6px;
    }

    #loading-bar-wrap {
      display: none;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      padding: 6px 10px;
    }

    #loading-bar {
      height: 6px;
      background: #1a73e8;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    #controls-hint {
      position: fixed; bottom: 16px; left: 16px;
      color: #888; font-size: 11px; font-family: monospace;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px; border-radius: 6px;
      line-height: 1.8;
      pointer-events: none;
    }

    #install-btn {
      display: none;
      background: #34a853;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: monospace;
    }

    #install-btn:hover { background: #2d9147; }
  </style>
</head>
<body>
  <div id="hud">FRC REBUILT 2026 Simulator</div>

  <div id="robot-ui">
    <button id="install-btn">⬇️ Install App</button>
    <button id="load-robot-btn">📁 Load Robot</button>
    <div id="robot-status">No robot loaded</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
  </div>

  <div id="controls-hint">
    WASD — Drive &nbsp;|&nbsp; E — Hood &nbsp;|&nbsp; Q — Hook<br>
    R — Intake &nbsp;|&nbsp; F/V — Column Up/Down<br>
    Mouse Drag — Orbit &nbsp;|&nbsp; Scroll — Zoom
  </div>

  <script type="module" src="/src/main.js"></script>

  <script type="module">
    import { RobotLoader } from '/src/robots/RobotLoader.js';

    // PWA install prompt
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.style.display = 'none';
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });

    // Robot loader
    window.addEventListener('sim-ready', async () => {
      const status   = document.getElementById('robot-status');
      const barWrap  = document.getElementById('loading-bar-wrap');
      const bar      = document.getElementById('loading-bar');

      document.getElementById('load-robot-btn').addEventListener('click', async () => {
        status.textContent = 'Picking folder...';

        const loader = new RobotLoader(window._scene, window._world);
        const result = await loader.pickRobotFolder();

        if (!result) {
          status.textContent = 'Cancelled';
          return;
        }

        const total = Object.keys(result.files).length;
        let loaded = 0;

        barWrap.style.display = 'block';
        bar.style.width = '0%';
        status.textContent = `Loading 0 / ${total} files...`;

        // Progress callback
        loader.onPartLoaded = (name) => {
          loaded++;
          const pct = Math.round((loaded / total) * 100);
          bar.style.width = pct + '%';
          status.textContent = `Loading ${loaded} / ${total} files...`;
        };

        try {
          await loader.loadFromFolder(result.dirHandle, result.files, [0, 0.5, 0]);
          window._robot = loader;
          barWrap.style.display = 'none';
          status.textContent = `✅ ${loader.config?.name || 'Robot'} loaded`;
        } catch (err) {
          barWrap.style.display = 'none';
          status.textContent = '❌ Failed to load robot';
          console.error(err);
        }
      });
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
