<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FRC REBUILT Sim</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 16px; left: 16px;
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px; border-radius: 8px;
      pointer-events: none;
      line-height: 1.8;
    }

    #robot-ui {
      position: fixed; top: 16px; right: 16px;
      display: flex; flex-direction: column; gap: 8px;
    }

    #load-robot-btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: monospace;
    }

    #load-robot-btn:hover { background: #1558b0; }

    #robot-status {
      color: #aaa;
      font-size: 12px;
      font-family: monospace;
      text-align: right;
      background: rgba(0,0,0,0.6);
      padding: 6px 10px;
      border-radius: 6px;
    }

    #loading-bar-wrap {
      display: none;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      padding: 6px 10px;
    }

    #loading-bar {
      height: 6px;
      background: #1a73e8;
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s;
    }

    #controls-hint {
      position: fixed; bottom: 16px; left: 16px;
      color: #888; font-size: 11px; font-family: monospace;
      background: rgba(0,0,0,0.5);
      padding: 8px 12px; border-radius: 6px;
      line-height: 1.8;
      pointer-events: none;
    }

    #install-btn {
      display: none;
      background: #34a853;
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: monospace;
    }

    #install-btn:hover { background: #2d9147; }
  </style>
  <script type="module" crossorigin src="/assets/index-DWkOhEwo.js"></script>
</head>
<body>
  <div id="hud">FRC REBUILT 2026 Simulator</div>

  <div id="robot-ui">
    <button id="install-btn">⬇️ Install App</button>
    <button id="load-robot-btn">📁 Load Robot</button>
    <div id="robot-status">No robot loaded</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
  </div>

  <div id="controls-hint">
    WASD — Drive &nbsp;|&nbsp; E — Hood &nbsp;|&nbsp; Q — Hook<br>
    R — Intake &nbsp;|&nbsp; F/V — Column Up/Down<br>
    Mouse Drag — Orbit &nbsp;|&nbsp; Scroll — Zoom
  </div>



  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
